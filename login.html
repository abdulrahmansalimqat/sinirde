<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - الإدارة</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: var(--black); color: var(--white); cursor: auto; display: flex; justify-content: center; align-items: center; min-height: 100vh;}
        
        .login-box {
            background-color: transparent;
            border: 2px solid var(--white);
            padding: 4rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 2rem;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .form-group input {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            color: var(--white);
            padding: 0.5rem 0;
            font-family: inherit;
            font-size: 1.2rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: var(--white);
        }

        .btn-submit {
            background-color: var(--white);
            color: var(--black);
            border: none;
            padding: 1rem 2rem;
            width: 100%;
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        #error-msg {
            color: #ff6b6b;
            margin-top: 1rem;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="login-box fade-in-up" style="opacity: 1; transform: translateY(0);">
        <h1>دخول المدير</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" required placeholder="أدخل كلمة المرور...">
            </div>
            <button type="submit" class="btn-submit">تسجيل الدخول</button>
            <p id="error-msg">كلمة المرور غير صحيحة.</p>
        </form>
        <div style="margin-top: 2rem;">
            <a href="index.html" class="hover-underline" style="font-size: 0.9rem; opacity: 0.7;">&larr; العودة للرئيسية</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            // Simple front-end security checking (just to meet requirements without backend)
            // Password is: admin123
            if(pass === 'admin123') {
                sessionStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
