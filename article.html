<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقال - مقامرين المشاعر و الأهداف</title>
    <meta name="description" content="اقرأ المقال الكامل عن تجربة الشخصية الحدية.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@300;500;700&family=Inter:wght@300;500;700;900&family=Vazirmatn:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="section-light">
    <div class="noise"></div>
    <div class="custom-cursor"></div>

    <!-- Main Navigation -->
    <nav class="navbar">
        <div class="logo"><a href="index.html" data-i18n="nav_logo" style="color: inherit; text-decoration: none;">مقامر<span>.</span></a></div>
        <ul class="nav-links">
            <li><a href="index.html" class="hover-underline" data-i18n="nav_home">الرئيسية</a></li>
            <li><a href="blog.html" class="hover-underline" data-i18n="nav_blog">المدونة</a></li>
            <li><a href="contact.html" class="hover-underline" data-i18n="nav_contact">اتصل بنا</a></li>
            <li>
                <select id="lang-switch" class="lang-switch">
                    <option value="ar" data-i18n="lang_ar">العربية</option>
                    <option value="en" data-i18n="lang_en">English</option>
                    <option value="tr" data-i18n="lang_tr">Türkçe</option>
                    <option value="es" data-i18n="lang_es">Español</option>
                    <option value="ru" data-i18n="lang_ru">Русский</option>
                    <option value="fa" data-i18n="lang_fa">فارسی</option>
                </select>
            </li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- Article Header -->
    <header class="article-header section-light" id="article-head">
        <div class="container container-large" id="article-title-container">
            <!-- Populated via JS -->
            <h1 class="article-title-huge fade-in-up">جاري التحميل...</h1>
        </div>
    </header>

    <!-- Article Content -->
    <section class="section-light pt-0">
        <div class="container container-large">
            <div class="article-body-wrapper">
                <aside class="article-sidebar fade-in-up delay-1" id="article-sidebar">
                    <!-- Populated via JS -->
                </aside>
                <main id="article-body" class="article-content fade-in-up delay-2">
                    <!-- Populated via JS -->
                </main>
                <div></div> <!-- Empty column for balance in a 1-3-1 grid -->
            </div>
            
            <div style="text-align: center; margin-top: 5rem;">
                <a href="blog.html" class="back-btn-huge fade-in-up delay-3" id="back-btn">
                    <span data-i18n="blog_back">العودة للمدونة</span>
                </a>
            </div>
        </div>
    </section>

    <!-- Newsletter Section -->
    <section class="newsletter-section section-dark">
        <div class="container center">
            <h2 class="huge-text fade-in-up" data-i18n="newsletter_title">اشترك في النشرة البريدية</h2>
            <p class="fade-in-up delay-1 mt-2" data-i18n="newsletter_desc">كن أول من يعرف عن مقالاتنا وتجاربنا الجديدة.</p>
            <form class="newsletter-form fade-in-up delay-2" onsubmit="event.preventDefault(); this.querySelector('.newsletter-success').style.display='block'; this.querySelector('input').value='';">
                <div class="newsletter-input-group">
                    <input type="email" required data-i18n-placeholder="newsletter_placeholder" placeholder="بريدك الإلكتروني">
                    <button type="submit" data-i18n="newsletter_btn">اشترك الآن</button>
                </div>
                <p class="newsletter-success" style="display:none; margin-top:1rem; opacity:0.8;">✓</p>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer black-on-white">
        <div class="container container-footer">
            <div class="footer-logo" data-i18n="footer_logo">مقامرين المشاعر و الأهداف</div>
            <p class="disclaimer" data-i18n="footer_disclaimer">هذا الموقع هو تجسيد فني وتوعوي وليس بديلاً عن الاستشارة الطبية.</p>
            <div class="social-links">
                <a href="#" data-i18n="footer_design">تصميم</a>
                <a href="#" data-i18n="footer_hashtag">#الشخصية_الحدية</a>
            </div>
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="script.js"></script>
    <script src="article.js"></script>
</body>
</html>
